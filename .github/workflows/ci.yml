name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: '20'

      - name: Install Dependencies
        run: npm install

      - name: Check Formatting (Prettier)
        run: npm run format:check

      - name: Validate HTML Structure
        run: npm run lint:html
